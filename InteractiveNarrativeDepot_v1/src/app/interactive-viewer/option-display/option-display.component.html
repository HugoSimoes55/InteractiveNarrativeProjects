<div class="group width-1 border-1">
	<!------------------>
	<!-- Option Group -->
	<!------------------>
	@if ((optionGroup.Title || optionGroup.HeaderText)
	&& optionGroup.IsVisible) {

	<div class="header-title"
		 *ngIf="optionGroup.Title">
		<h2>{{ optionGroup.Title }}</h2>
	</div>
	<div class="header-text"
		 *ngIf="optionGroup.HeaderText">
		<div>
			<p [innerHTML]="optionGroup.HeaderText"></p>
		</div>
	</div>
	}
	<!------------------>
	<!-- Option Items -->
	<!------------------>
	@if ( optionGroup.IsVisible
	&& optionGroup.OptionItems.length > 0) {
	<div *ngFor="let item of optionGroup.OptionItems"
		 class="option-5 center border-1 no-highlight"
		 [ngClass]="{'selected': item.Selected}">

		<div (click)="OnSelectionClick(item)">
			<div *ngIf="item.hasImage"
				 class="clearBorder center image-control"
				 [style.height]="item.MaxHeight + 'px'"
				 [style.width]="item.MaxHeight + 'px'">
				<img src="{{ item.ImageURL }}"
					 alt="{{ item.ImageText }}">
			</div>
			<span style="font-size: 24px;">{{ item.OptionTitle }}</span>
			<br>
			<div *ngIf="item.OptionText"
				 class=" vertical-margin-3">
				<br>
				<span>{{ item.OptionText }}</span>
				<br>
			</div>
		</div>
	</div>
	}
</div>
