<div class="main menu">
	<div class="menu-option center border-1"
		 [ngClass]="{'selected': show_Viewer}"
		 (click)="MenuViewer()">Interactive Viewer</div>
	<div class="menu-option center border-1"
		 [ngClass]="{'selected': show_Maker}"
		 (click)="MenuMaker()">Interactive Maker</div>
</div>



@if (show_Viewer) {
<app-interactive-viewer></app-interactive-viewer>
}

@if (show_Maker) {
<app-interactive-maker></app-interactive-maker>
}
